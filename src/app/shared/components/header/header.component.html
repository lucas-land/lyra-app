<ion-header>
  <ion-toolbar class="lyra-toolbar">
    @if (showBackButton) {
      <ion-buttons slot="start">
        <ion-button (click)="voltar()" class="lyra-back-button" fill="clear">
          <ion-icon name="arrow-back" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-buttons>
    }
    @if (titulo) {
      <ion-title class="lyra-toolbar-title">{{ titulo }}</ion-title>
    } @else {
      <div class="lyra-header-brand">
        <img src="assets/Logo_Lyra_Branco.png" alt="" class="lyra-header-logo" />
        <div class="lyra-titles">
          <span class="lyra-title">Sociedade de</span>
          <span class="lyra-subtitle">Canto Lyra</span>
        </div>
      </div>
    }
  </ion-toolbar>
</ion-header>
