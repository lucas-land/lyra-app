<app-header
  [variant]="'adminForm'"
  [titulo]="'Editar Notícia'"
  backRoute="/noticias-admin">
</app-header>

<ion-content [fullscreen]="true" class="form-content">

  <div class="form-container">

    <div class="form-group">
      <label>Imagem do Evento</label>

      <div class="image-upload-box">

        @if (noticia.imagem) {
          <div class="image-preview">
            <img [src]="noticia.imagem" class="preview-img" />
          </div>

          <button class="remove-image" (click)="noticia.imagem = null">
            Remover imagem
          </button>
        }

      </div>
    </div>

    <div class="form-group">
      <label>Título</label>
      <input type="text" [(ngModel)]="noticia.titulo" placeholder="Título da notícia" />
    </div>

    <div class="form-group">
      <label>Descrição Resumida</label>
      <textarea [(ngModel)]="noticia.descricao" placeholder="Insira uma breve descrição"></textarea>
    </div>

    <div class="form-group">
      <label>Conteúdo Completo</label>
      <textarea [(ngModel)]="noticia.conteudo" placeholder="Conteúdo completo da notícia"></textarea>
    </div>

    <div class="button-group">

      <ion-button class="submit-button" routerLink="/noticias-admin">
        <ion-icon name="save-outline"></ion-icon>
        <span>Atualizar Notícia</span>
      </ion-button>

      <ion-button fill="outline" class="cancel-button" routerLink="/noticias-admin">
        <span>Cancelar</span>
      </ion-button>

    </div>

  </div>

</ion-content>
