<app-header
  [variant]="'adminForm'"
  [titulo]="'Editar Evento'"
  backRoute="/eventos-admin">
</app-header>

<ion-content [fullscreen]="true" class="form-content">

  <div class="form-container">

    <div class="form-group">
      <label>Título</label>
      <input type="text" [(ngModel)]="evento.titulo" placeholder="Título do evento" />
    </div>

    <div class="form-group">
      <label>Data do Evento</label>
      <input type="date" [(ngModel)]="evento.data" />
    </div>

    <div class="form-group">
      <label>Local</label>
      <input type="text" [(ngModel)]="evento.local" placeholder="Local do evento" />
    </div>

    <div class="form-group">
      <label>Descrição Resumida</label>
      <textarea [(ngModel)]="evento.descricao" placeholder="Insira uma breve descrição"></textarea>
    </div>

    <div class="form-group">
      <label>Conteúdo Completo</label>
      <textarea [(ngModel)]="evento.conteudo" placeholder="Conteúdo completo do evento"></textarea>
    </div>

    <div class="button-group">

      <ion-button class="submit-button" routerLink="/eventos-admin">
        <ion-icon name="save-outline"></ion-icon>
        <span>Atualizar Evento</span>
      </ion-button>

      <ion-button fill="outline" class="cancel-button" routerLink="/eventos-admin">
        <span>Cancelar</span>
      </ion-button>

    </div>

  </div>

</ion-content>
